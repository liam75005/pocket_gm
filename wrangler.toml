name = "pocket-gm-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# Optional: lock CORS to your GitHub Pages domain after deploying
# [vars]
# ALLOWED_ORIGIN = "https://YOUR_USERNAME.github.io"
# RATE_LIMIT_PER_HOUR = "60"

# Optional: rate limiting via KV
# Run: wrangler kv:namespace create "RATE_LIMIT_KV"
# Then paste the id below.
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "your_kv_namespace_id"
